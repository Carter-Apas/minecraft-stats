apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-survival-api
  labels:
    app: minecraft-survival-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-survival-api
  template:
    metadata:
      labels:
        app: minecraft-survival-api
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: minecraft-data
                    operator: In
                    values:
                      - survival
      containers:
        - name: api
          image: ghcr.io/example/minecraft-survival-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3001"
            - name: DATA_DIR
              value: /data
            - name: CACHE_TTL_MS
              value: "30000"
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
          volumeMounts:
            - name: minecraft-survival-data
              mountPath: /data
              readOnly: true
      volumes:
        - name: minecraft-survival-data
          hostPath:
            path: /srv/minecraft/survival
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-survival-api
spec:
  selector:
    app: minecraft-survival-api
  ports:
    - name: http
      port: 3001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-survival-web
  labels:
    app: minecraft-survival-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-survival-web
  template:
    metadata:
      labels:
        app: minecraft-survival-web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/minecraft-survival-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-survival-web
spec:
  selector:
    app: minecraft-survival-web
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minecraft-survival-dashboard
spec:
  rules:
    - host: minecraft-survival.coder.kiwi
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: minecraft-survival-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minecraft-survival-web
                port:
                  number: 8080

