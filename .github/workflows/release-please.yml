name: Release Please

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @minecraft-stats/api build

      - name: Build frontend
        run: pnpm --filter @minecraft-stats/web build

  release-please:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release target
        id: release-target
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          case "$TAG_NAME" in
            api-v*)
              echo "component=api" >> "$GITHUB_OUTPUT"
              echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/minecraft-stats-api" >> "$GITHUB_OUTPUT"
              echo "dockerfile=./Dockerfile.api" >> "$GITHUB_OUTPUT"
              echo "package_filter=@minecraft-stats/api" >> "$GITHUB_OUTPUT"
              echo "version=${TAG_NAME#api-}" >> "$GITHUB_OUTPUT"
              ;;
            web-v*)
              echo "component=web" >> "$GITHUB_OUTPUT"
              echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/minecraft-stats-web" >> "$GITHUB_OUTPUT"
              echo "dockerfile=./Dockerfile.web" >> "$GITHUB_OUTPUT"
              echo "package_filter=@minecraft-stats/web" >> "$GITHUB_OUTPUT"
              echo "version=${TAG_NAME#web-}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release tag: $TAG_NAME" >&2
              exit 1
              ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build released package
        run: pnpm --filter "${{ steps.release-target.outputs.package_filter }}" build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: image-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.release-target.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release-target.outputs.version }}
            type=raw,value=latest

      - name: Build and push released image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.release-target.outputs.dockerfile }}
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
