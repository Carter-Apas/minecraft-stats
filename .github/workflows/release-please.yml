name: Release Please

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

  release-please:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release target
        id: release-target
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          case "$TAG_NAME" in
            api-v*)
              echo "app_dir=apps/api" >> "$GITHUB_OUTPUT"
              echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/minecraft-stats-api" >> "$GITHUB_OUTPUT"
              echo "dockerfile=./Dockerfile.api" >> "$GITHUB_OUTPUT"
              echo "version=${TAG_NAME#api-}" >> "$GITHUB_OUTPUT"
              ;;
            web-v*)
              echo "app_dir=apps/web" >> "$GITHUB_OUTPUT"
              echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/minecraft-stats-web" >> "$GITHUB_OUTPUT"
              echo "dockerfile=./Dockerfile.web" >> "$GITHUB_OUTPUT"
              echo "version=${TAG_NAME#web-}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release tag: $TAG_NAME" >&2
              exit 1
              ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ steps.release-target.outputs.app_dir }}/package-lock.json

      - name: Install released package dependencies
        working-directory: ${{ steps.release-target.outputs.app_dir }}
        run: npm ci

      - name: Build released package
        working-directory: ${{ steps.release-target.outputs.app_dir }}
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: image-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.release-target.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release-target.outputs.version }}
            type=raw,value=latest

      - name: Build and push released image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.release-target.outputs.dockerfile }}
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          labels: ${{ steps.image-meta.outputs.labels }}
