name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image owner
        id: image-owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @minecraft-stats/api build

      - name: Build frontend
        run: pnpm --filter @minecraft-stats/web build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for API
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image-owner.outputs.value }}/minecraft-stats-api
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Docker metadata for frontend
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image-owner.outputs.value }}/minecraft-stats-web
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

  release-please:
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Run release-please
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
